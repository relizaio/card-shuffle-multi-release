name: Build Mafia Components And Submit A Single Batch To ReARM

# Demonstrates rearm-actions/add-multi-release: three component releases
# (mafia-vue, mafia-express, mafia-helm) are submitted to ReARM in ONE
# all-or-nothing batch. The product "mafia" auto-integrates those three
# dependencies, and — because the batch dedupes auto-integrate per feature
# set — exactly ONE product release is produced for the whole batch.

on:
  push:
  workflow_dispatch:

env:
  REARM_API_URL: https://psclaude.rearmhq.com
  IMAGE_NS: registry.test.relizahub.com/b284a7d2-9989-4eb8-a43c-88b65f1965a8-public

jobs:
  batch-release:
    name: Build components + single batched submit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup ReARM CLI
        uses: relizaio/rearm-actions/setup-cli@main

      - name: Docker login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login registry.test.relizahub.com -u "${{ secrets.DOCKER_LOGIN }}" --password-stdin

      - name: Compute version + commit metadata
        id: meta
        run: |
          echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "vcsuri=${{ github.server_url }}/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          # Commit metadata for the SCE (message/author/email/date) — without these
          # the Source Code Entry renders empty Date/Message/Author columns.
          {
            echo "commit_message=$(git log -1 --pretty=%s)"
            echo "commit_author=$(git log -1 --pretty=%an)"
            echo "commit_email=$(git log -1 --pretty=%ae)"
            echo "commit_date=$(git log -1 --pretty=%cI)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push mafia-vue
        id: vue
        run: |
          IMG="${IMAGE_NS}/mafia-vue:${{ steps.meta.outputs.version }}"
          docker build -t "$IMG" \
            --build-arg VERSION=${{ steps.meta.outputs.version }} \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg GIT_BRANCH=${{ github.ref_name }} \
            mafia-vue
          docker push "$IMG"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMG" | cut -d'@' -f2)
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Build and push mafia-express
        id: express
        run: |
          IMG="${IMAGE_NS}/mafia-express:${{ steps.meta.outputs.version }}"
          docker build -t "$IMG" \
            --build-arg VERSION=${{ steps.meta.outputs.version }} \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg GIT_BRANCH=${{ github.ref_name }} \
            mafia-express
          docker push "$IMG"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMG" | cut -d'@' -f2)
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Generate component SBOMs
        run: |
          npm install --global @cyclonedx/cyclonedx-npm@4.2.1 --ignore-scripts
          ( cd mafia-vue && npm ci --ignore-scripts && cyclonedx-npm --flatten-components > ../vue.cdx.json )
          ( cd mafia-express && npm ci --ignore-scripts && cyclonedx-npm --flatten-components > ../express.cdx.json )
          du -h vue.cdx.json express.cdx.json

      - name: Assemble release batch
        run: |
          jq -n \
            --arg vcs "${{ steps.meta.outputs.vcsuri }}" \
            --arg commit "${{ github.sha }}" \
            --arg ver "${{ steps.meta.outputs.version }}" \
            --arg msg "${{ steps.meta.outputs.commit_message }}" \
            --arg author "${{ steps.meta.outputs.commit_author }}" \
            --arg email "${{ steps.meta.outputs.commit_email }}" \
            --arg cdate "${{ steps.meta.outputs.commit_date }}" \
            --arg vbranch "${{ github.ref_name }}" \
            --arg vueImg "${{ steps.vue.outputs.image }}" \
            --arg vueDig "${{ steps.vue.outputs.digest }}" \
            --arg expImg "${{ steps.express.outputs.image }}" \
            --arg expDig "${{ steps.express.outputs.digest }}" \
            '[
              {
                vcsUri: $vcs, repoPath: "mafia-vue", branch: "main", version: $ver, lifecycle: "ASSEMBLED",
                sourceCodeEntry: { commit: $commit, uri: $vcs, type: "git", commitMessage: $msg, commitAuthor: $author, commitEmail: $email, dateActual: $cdate, vcsBranch: $vbranch,
                  artifacts: [ { displayIdentifier: "mafia-vue-source-sbom", type: "BOM", bomFormat: "CYCLONEDX", filePath: "./vue.cdx.json" } ] },
                outboundDeliverables: [ { displayIdentifier: $vueImg, type: "CONTAINER", softwareMetadata: { packageType: "CONTAINER", digests: [ $vueDig ] } } ]
              },
              {
                vcsUri: $vcs, repoPath: "mafia-express", branch: "main", version: $ver, lifecycle: "ASSEMBLED",
                sourceCodeEntry: { commit: $commit, uri: $vcs, type: "git", commitMessage: $msg, commitAuthor: $author, commitEmail: $email, dateActual: $cdate, vcsBranch: $vbranch,
                  artifacts: [ { displayIdentifier: "mafia-express-source-sbom", type: "BOM", bomFormat: "CYCLONEDX", filePath: "./express.cdx.json" } ] },
                outboundDeliverables: [ { displayIdentifier: $expImg, type: "CONTAINER", softwareMetadata: { packageType: "CONTAINER", digests: [ $expDig ] } } ]
              },
              {
                vcsUri: $vcs, repoPath: "mafia-helm", branch: "main", version: $ver, lifecycle: "ASSEMBLED",
                sourceCodeEntry: { commit: $commit, uri: $vcs, type: "git", commitMessage: $msg, commitAuthor: $author, commitEmail: $email, dateActual: $cdate, vcsBranch: $vbranch }
              }
            ]' > batch.json
          echo "=== batch.json ===" && cat batch.json

      - name: Submit the batch (single product auto-integrate)
        uses: relizaio/rearm-actions/add-multi-release@main
        with:
          rearm_api_id: ${{ secrets.REARM_API_ID }}
          rearm_api_key: ${{ secrets.REARM_API_KEY }}
          rearm_api_url: ${{ env.REARM_API_URL }}
          infile: batch.json

      - name: Verify the batch produced ONE product release covering all 3 components
        run: |
          # The "mafia" product auto-integrates its 3 dependency components. Because
          # add-multi-release dedupes auto-integrate per feature set, the whole batch
          # yields exactly ONE product release whose parentReleases reference all
          # three component releases — not one product release per component.
          rel=$(rearm getlatestrelease \
            -i "${{ secrets.REARM_API_ID }}" \
            -k "${{ secrets.REARM_API_KEY }}" \
            -u "${{ env.REARM_API_URL }}" \
            --component 782af254-b8f2-4c0d-b47e-1d8ba60d367a \
            --branch "Base Feature Set")
          echo "Product release: $rel"
          puuid=$(echo "$rel" | jq -r '.uuid // empty')
          pver=$(echo "$rel" | jq -r '.version // empty')
          parents=$(echo "$rel" | jq '(.parentReleases // []) | length')
          echo "Latest product release uuid=$puuid version=$pver parentReleases=$parents"
          if [ -z "$puuid" ]; then
            echo "::error::No product release found on the mafia Base Feature Set after the batch." >&2
            exit 1
          fi
          if [ "$parents" != "3" ]; then
            echo "::error::Expected a single auto-integrated product release with 3 component parents, got $parents." >&2
            exit 1
          fi
          echo "OK: single product release $puuid (v$pver) integrated all 3 component releases from this batch."
